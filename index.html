<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ Siggy Soul Forge ✦ Ritual</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap');
:root{
  --void:#050508;--purple:#7c3aed;--pg:#a855f7;--pink:#ec4899;
  --text:#e2e8f0;--muted:#94a3b8;
  --border:rgba(168,85,247,0.25);--glow:rgba(168,85,247,0.4);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow-x:hidden}
body{
  background:var(--void);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%,rgba(124,58,237,.18) 0%,transparent 65%),
    radial-gradient(ellipse 50% 40% at 85% 85%,rgba(236,72,153,.09) 0%,transparent 60%),
    radial-gradient(ellipse 40% 30% at 10% 70%,rgba(6,182,212,.05) 0%,transparent 60%);
}

/* STARS */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d) ease-in-out infinite var(--dl)}
@keyframes twinkle{0%,100%{opacity:.04;transform:scale(1)}50%{opacity:.85;transform:scale(1.4)}}

/* SCREENS */
.screen{position:relative;z-index:1;display:none;min-height:100vh}
.screen.active{display:flex}

/* ════════════════════════════════════
   PAT SCREEN
════════════════════════════════════ */
#s-pat{flex-direction:column;align-items:center;justify-content:center;padding:2rem;gap:0}

.brand{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(1.1rem,3.5vw,2rem);
  color:var(--pg);text-align:center;
  text-shadow:0 0 30px var(--glow),0 0 60px rgba(168,85,247,.2);
  letter-spacing:.05em;margin-bottom:.25rem
}
.brand-sub{
  font-family:'Space Mono',monospace;font-size:.65rem;color:var(--muted);
  letter-spacing:.22em;text-transform:uppercase;margin-bottom:2.2rem;text-align:center
}

/* Cat stage — no circle, pure transparent */
.cat-stage{
  position:relative;width:220px;height:220px;
  cursor:pointer;user-select:none;margin-bottom:1rem;
  -webkit-tap-highlight-color:transparent
}

/* Soft ambient glow behind cat, NO border, NO circle */
.aura{
  position:absolute;inset:-35px;pointer-events:none;
  background:radial-gradient(ellipse 65% 60% at 50% 60%,rgba(100,220,50,.25) 0%,rgba(168,85,247,.15) 40%,transparent 70%);
  animation:aura 2.8s ease-in-out infinite
}
@keyframes aura{0%,100%{transform:scale(.9);opacity:.5}50%{transform:scale(1.1);opacity:1}}

/* Siggy image — fully transparent, no crop */
#siggy-img{
  width:220px;height:220px;object-fit:contain;display:block;
  position:relative;z-index:2;
  transform-origin:50% 85%;
  animation:breathe 3.2s ease-in-out infinite;
  /* mix-blend-mode to help transparency */
  filter:drop-shadow(0 6px 28px rgba(124,58,237,.5)) drop-shadow(0 2px 8px rgba(0,0,0,.4));
}
@keyframes breathe{
  0%,100%{transform:scaleY(1) scaleX(1) translateY(0)}
  50%{transform:scaleY(.972) scaleX(1.012) translateY(2.5px)}
}

/* Pat hand */
.pat-hand{
  position:absolute;top:0;left:50%;
  transform:translateX(-50%) translateY(-65px);
  font-size:2.6rem;opacity:0;pointer-events:none;z-index:10
}
.pat-hand.go{animation:hand-pat .42s ease-in-out forwards}
@keyframes hand-pat{
  0%  {transform:translateX(-50%) translateY(-65px);opacity:0}
  28% {transform:translateX(-50%) translateY(14px);opacity:1}
  58% {transform:translateX(-50%) translateY(-6px);opacity:1}
  100%{transform:translateX(-50%) translateY(-65px);opacity:0}
}

/* Body squeeze animations */
@keyframes pat-squeeze{
  0%  {transform:scaleX(1)    scaleY(1)    translateY(0)   rotate(0deg)}
  14% {transform:scaleX(1.11) scaleY(.87)  translateY(10px) rotate(-1.5deg)}
  34% {transform:scaleX(.93)  scaleY(1.09) translateY(-6px) rotate(1.5deg)}
  55% {transform:scaleX(1.07) scaleY(.92)  translateY(5px)  rotate(-.7deg)}
  76% {transform:scaleX(.98)  scaleY(1.04) translateY(-2px) rotate(.4deg)}
  100%{transform:scaleX(1)    scaleY(1)    translateY(0)   rotate(0deg)}
}
@keyframes happy-bounce{
  0%,100%{transform:scaleX(1) scaleY(1) translateY(0) rotate(0deg)}
  22%{transform:scaleX(1.07) scaleY(.92) translateY(8px) rotate(-2deg)}
  50%{transform:scaleX(.95) scaleY(1.08) translateY(-11px) rotate(2.2deg)}
  76%{transform:scaleX(1.04) scaleY(.96) translateY(4px) rotate(-1deg)}
}
.squeezing{animation:pat-squeeze .44s ease-in-out forwards !important}
.happy-anim{animation:happy-bounce .52s ease-in-out forwards !important}

/* Meow pop */
.meow-pop{
  position:absolute;top:-46px;left:50%;transform:translateX(-50%);
  background:rgba(124,58,237,.18);border:1px solid rgba(168,85,247,.3);
  border-radius:20px;padding:.35rem .95rem;font-size:.82rem;white-space:nowrap;
  opacity:0;pointer-events:none;z-index:30;backdrop-filter:blur(10px)
}
.meow-pop.show{animation:pop-up .88s ease-out forwards}
@keyframes pop-up{
  0%  {opacity:0;transform:translateX(-50%) translateY(8px)}
  20% {opacity:1;transform:translateX(-50%) translateY(-6px)}
  75% {opacity:1;transform:translateX(-50%) translateY(-6px)}
  100%{opacity:0;transform:translateX(-50%) translateY(-20px)}
}

/* Sparkles */
.sp{position:absolute;pointer-events:none;font-size:1rem;opacity:0;z-index:20;
  animation:sp-fly .88s ease-out forwards}
@keyframes sp-fly{
  0%  {opacity:1;transform:translate(0,0) scale(.35) rotate(0deg)}
  100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(1.7) rotate(200deg)}
}

/* Paw progress */
.pat-paws{display:flex;gap:12px;margin-bottom:1.1rem;align-items:center}
.paw{font-size:1.25rem;opacity:.18;transition:all .3s ease;transform:scale(.8)}
.paw.lit{opacity:1;transform:scale(1.18);filter:drop-shadow(0 0 10px rgba(168,85,247,.9))}

.pat-hint{
  font-size:.82rem;color:var(--muted);text-align:center;
  animation:float 2.2s ease-in-out infinite
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* ════════════════════════════════════
   LOGIN SCREEN
════════════════════════════════════ */
#s-login{flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.login-wrap{width:100%;max-width:400px;animation:fade-up .5s ease-out}
@keyframes fade-up{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

.login-card{
  background:rgba(10,10,22,.85);border:1px solid var(--border);border-radius:24px;
  padding:2.2rem 2rem;backdrop-filter:blur(24px);
  box-shadow:0 0 50px rgba(124,58,237,.1),inset 0 1px 0 rgba(255,255,255,.04)
}
.login-siggy{
  width:180px;height:180px;object-fit:contain;margin:0 auto .8rem;display:block;
  filter:drop-shadow(0 0 20px var(--glow)) drop-shadow(0 4px 12px rgba(0,0,0,.5));
  animation:siggy-float 3s ease-in-out infinite
}
@keyframes siggy-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.login-title{
  font-family:'Cinzel Decorative',serif;font-size:1.05rem;color:var(--pg);
  text-align:center;margin-bottom:.3rem
}
.login-sub{font-size:.76rem;color:var(--muted);text-align:center;margin-bottom:1.6rem}

.form-group{margin-bottom:1rem}
.form-label{
  font-size:.75rem;color:var(--muted);letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:.4rem;display:block
}
.form-input{
  width:100%;background:rgba(255,255,255,.04);border:1.5px solid var(--border);
  border-radius:12px;padding:.72rem 1rem;color:var(--text);
  font-family:'Nunito',sans-serif;font-size:.93rem;outline:none;transition:all .25s
}
.form-input:focus{
  border-color:var(--pg);background:rgba(100,220,50,.06);
  box-shadow:0 0 0 3px rgba(100,220,50,.12)
}
.form-input::placeholder{color:rgba(148,163,184,.38)}

.btn-enter{
  width:100%;background:linear-gradient(135deg,#7c3aed,#a855f7,#ec4899);
  border:none;border-radius:14px;padding:.82rem;color:#fff;
  font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;
  cursor:pointer;margin-top:.6rem;letter-spacing:.03em;
  position:relative;overflow:hidden;transition:all .25s;
  box-shadow:0 4px 20px rgba(124,58,237,.4)
}
.btn-enter:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(124,58,237,.6)}
.btn-enter::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.14),transparent);
  opacity:0;transition:opacity .25s
}
.btn-enter:hover::after{opacity:1}

/* ════════════════════════════════════
   CHAT SCREEN
════════════════════════════════════ */
#s-chat{flex-direction:column;height:100vh;max-height:100vh}

.chat-header{
  padding:.75rem 1.1rem;
  background:rgba(5,5,8,.92);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:.8rem;
  backdrop-filter:blur(20px);flex-shrink:0;
  transition:border-bottom-color .6s ease, background .6s ease
}
.header-avatar{position:relative;flex-shrink:0}
.header-avatar img{
  width:44px;height:44px;object-fit:contain;display:block;
  filter:drop-shadow(0 0 10px var(--glow)) drop-shadow(0 2px 6px rgba(0,0,0,.5)) drop-shadow(0 2px 6px rgba(0,0,0,.5));
}
.status-dot{
  width:10px;height:10px;background:#22c55e;border-radius:50%;
  border:2px solid var(--void);position:absolute;bottom:1px;right:1px;
  animation:pulse-dot 2s infinite
}
@keyframes pulse-dot{
  0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}
  50%{box-shadow:0 0 0 5px rgba(34,197,94,0)}
}

/* Name + mood side by side */
.header-info{flex:1;min-width:0}
.header-row{display:flex;align-items:center;gap:.5rem}
.header-name{font-weight:800;font-size:.97rem;color:var(--text);white-space:nowrap}
.header-mood-badge{
  display:flex;align-items:center;gap:.3rem;
  background:rgba(100,220,50,.12);border:1px solid rgba(168,85,247,.22);
  border-radius:20px;padding:.18rem .6rem;
  transition:background .5s ease, border-color .5s ease;
  flex-shrink:0
}
.mood-emoji-el{font-size:.95rem;line-height:1;transition:all .3s}
.mood-label{
  font-size:.65rem;color:var(--muted);font-family:'Space Mono',monospace;
  transition:color .4s;white-space:nowrap
}
.header-status-row{font-size:.68rem;color:var(--muted);font-family:'Space Mono',monospace;margin-top:.1rem}

/* Messages */
.chat-msgs{
  flex:1;overflow-y:auto;padding:1.2rem 1.4rem;
  display:flex;flex-direction:column;gap:1rem;scroll-behavior:smooth
}
.chat-msgs::-webkit-scrollbar{width:3px}
.chat-msgs::-webkit-scrollbar-thumb{background:rgba(120,255,50,.28);border-radius:4px}

.msg{display:flex;gap:.6rem;max-width:78%;animation:msg-in .28s ease-out}
@keyframes msg-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;align-self:flex-end}
.msg.bot{align-self:flex-start}

.msg-avatar img{
  width:34px;height:34px;object-fit:contain;flex-shrink:0;margin-top:3px;
  filter:drop-shadow(0 0 7px rgba(168,85,247,.5))
}
.user-avatar{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;margin-top:3px;
  background:linear-gradient(135deg,#7c3aed,#a855f7,#ec4899);
  border:1.5px solid rgba(168,85,247,.35);
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;line-height:1;
  box-shadow:0 0 10px rgba(168,85,247,.3)
}
.bubble{
  padding:.65rem .95rem;border-radius:18px;
  font-size:.88rem;line-height:1.56;word-break:break-word
}
.msg.bot .bubble{
  background:rgba(124,58,237,.11);border:1px solid rgba(124,58,237,.2);
  border-radius:4px 18px 18px 18px
}
.msg.user .bubble{
  background:linear-gradient(135deg,rgba(124,58,237,.32),rgba(236,72,153,.22));
  border:1px solid rgba(168,85,247,.28);border-radius:18px 4px 18px 18px
}
.msg-meta{
  font-size:.64rem;color:rgba(148,163,184,.42);
  margin-top:.28rem;font-family:'Space Mono',monospace
}
.msg.user .msg-meta{text-align:right}

/* Typing */
.typing-indicator{display:flex;gap:.6rem;align-items:flex-start;animation:msg-in .28s ease-out}
.typing-bubble{
  background:rgba(124,58,237,.1);border:1px solid rgba(100,220,50,.22);
  border-radius:4px 18px 18px 18px;padding:.65rem .95rem;
  display:flex;gap:5px;align-items:center
}
.typing-dot{
  width:6px;height:6px;background:var(--pg);border-radius:50%;
  animation:typing-bounce 1.2s ease-in-out infinite
}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typing-bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}

/* Input */
.chat-input-wrap{
  padding:.75rem 1rem;background:rgba(5,5,8,.92);
  border-top:1px solid var(--border);backdrop-filter:blur(20px);
  display:flex;gap:.65rem;align-items:flex-end;flex-shrink:0
}
#chat-input{
  flex:1;background:rgba(255,255,255,.05);border:1.5px solid var(--border);
  border-radius:16px;padding:.68rem .95rem;color:var(--text);
  font-family:'Nunito',sans-serif;font-size:.88rem;outline:none;
  resize:none;max-height:120px;line-height:1.5;transition:all .25s;min-height:40px
}
#chat-input:focus{
  border-color:var(--pg);background:rgba(168,85,247,.06);
  box-shadow:0 0 0 3px rgba(168,85,247,.1)
}
.send-btn{
  width:42px;height:42px;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  border:none;border-radius:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .2s;box-shadow:0 3px 12px rgba(124,58,237,.4)
}
.send-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,58,237,.6)}
.send-btn svg{width:19px;height:19px;fill:#fff}

/* Toast */
.toast{
  position:fixed;top:1.5rem;left:50%;transform:translateX(-50%) translateY(-80px);
  background:rgba(10,10,22,.95);border:1px solid var(--border);border-radius:14px;
  padding:.65rem 1.3rem;font-size:.83rem;color:var(--text);z-index:1000;
  transition:transform .4s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 8px 30px rgba(0,0,0,.5);text-align:center;backdrop-filter:blur(20px)
}
.toast.show{transform:translateX(-50%) translateY(0)}


</style>
</head>

function parseMood(text){
  // New format: [mood:happy] at start
  const matchNew = text.match(/^\[mood:(\w+)\]/i);
  if(matchNew){
    const m = matchNew[1].toLowerCase();
    const map = {happy:'happy',curious:'curious',annoyed:'annoyed',angry:'angry',loving:'soft',playful:'playful',sleepy:'sleepy',soft:'soft'};
    if(map[m]) return map[m];
  }
  // Old format fallback: [MOOD:x] at end
  const matchOld = text.match(/\[MOOD:(\w+)[\]\}]/i);
  if(matchOld && MOODS[matchOld[1].toLowerCase()]) return matchOld[1].toLowerCase();
  return 'happy';
}

function addUserMsg(text){
  const msgs = document.getElementById('msgs');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `
    <div class="user-avatar">${userEmoji}</div>
    <div>
      <div class="bubble">${escHtml(text)}</div>
      <div class="msg-meta">${escHtml(userName)} · ${getTime()}</div>
    </div>`;
  msgs.appendChild(div);
  scrollDown();
}

async function sendMsg(){
  const inp = document.getElementById('chat-input');
  const text = inp.value.trim();
  if(!text) return;
  inp.value = '';
  inp.style.height = '';
  addUserMsg(text);
  showTyping();
  chatHistory.push({role:'user', content:text});
  document.getElementById('send-btn').disabled = true;
  try{
    const res = await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        messages: [
          {role:'system', content: SIGGY_SYSTEM + `\n\nThe user's nickname is "${userName}".`},
          ...chatHistory.slice(-24)
        ]
      })
    });
    const data = await res.json();
    if(data.error){
      console.error('API error:', data.error);
      addBotMsg('[mood:annoyed] ok something went wrong on my end... ' + (data.error.message||'try again?') + ' (=^-ω-^=)');
      document.getElementById('send-btn').disabled = false;
      return;
    }
    const reply = data.choices?.[0]?.message?.content || '[mood:annoyed] hm. the void returned nothing. try again~';
    chatHistory.push({role:'assistant', content:reply});
    addBotMsg(reply);
  }catch(e){
    console.error('Fetch error:', e);
    addBotMsg('[mood:annoyed] nyaa my connection to the multiverse just dropped... check the API key and try again (=^-ω-^=)');
  }
  document.getElementById('send-btn').disabled = false;
}

// ── INPUT AUTO RESIZE + ENTER ────────────────────────────────────
const cinput = document.getElementById('chat-input');
cinput.addEventListener('input', function(){
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight,120)+'px';
});
cinput.addEventListener('keydown', e=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMsg(); }
});

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}
</script>
